<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imager 镜像游侠</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232563eb'/%3E%3Cpath d='M30 65 L30 45 L40 45 L40 65 L45 65 L45 35 L55 35 L55 65 L60 65 L60 50 L70 50 L70 65 L75 65 L75 70 L25 70 L25 65 Z' fill='white'/%3E%3Ccircle cx='50' cy='30' r='12' fill='white'/%3E%3Cpath d='M42 30 L50 22 L58 30' stroke='%232563eb' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" rx="20" fill="url(#logoGradient)"/>
            <defs>
              <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#3b82f6"/>
                <stop offset="100%" style="stop-color:#1d4ed8"/>
              </linearGradient>
            </defs>
            <path d="M30 65 L30 45 L40 45 L40 65 L45 65 L45 35 L55 35 L55 65 L60 65 L60 50 L70 50 L70 65 L75 65 L75 70 L25 70 L25 65 Z" fill="white"/>
            <circle cx="50" cy="30" r="12" fill="white"/>
            <path d="M42 30 L50 22 L58 30" stroke="url(#logoGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="logo-text">
            <h1>Imager 镜像游侠</h1>
            <p>一站式容器镜像与文件传输管理平台，支持 Harbor 私有仓库管理和 SFTP 文件传输。</p>
          </div>
        </div>
      </header>

      <section class="card">
        <h2>仓库源配置</h2>
        <form id="harborForm" class="inline-form">
          <label>
            Harbor 名称
            <input type="text" name="repoName" placeholder="仓库名称" required />
          </label>
          <label>
            仓库地址
            <input type="url" name="harborUrl" placeholder="https://harbor.example.com" required />
          </label>
          <label>
            用户名
            <input type="text" name="username" placeholder="admin" required />
          </label>
          <label>
            密码 / Token
            <input type="password" name="password" placeholder="••••••" required />
          </label>
          <button type="button" id="verifyBtn">验证连接</button>
          <button type="submit">保存配置</button>
        </form>
        <p id="configStatus" class="status"></p>

        <div id="repoListContainer" style="margin-top: 8px;">
          <h3 style="font-size: 14px; color: var(--muted); margin-bottom: 8px;">已保存的仓库</h3>
          <div id="repoList" class="repo-list"></div>
        </div>
      </section>

      <section class="card">
        <h2>镜像同步</h2>
        <form id="syncForm" class="inline-form">
          <label>
            源镜像
            <input
              type="text"
              name="sourceImage"
              placeholder="docker.io/library/nginx:1.27"
              required
            />
          </label>
          <label>
            目标仓库
            <select name="targetRepo" id="syncTargetRepo" required>
              <option value="">请选择仓库</option>
            </select>
          </label>
          <label>
            目标项目
            <input type="text" name="targetProject" placeholder="library" required />
          </label>
          <label>
            镜像架构
            <select name="arch" id="syncArch">
              <option value="all">多架构</option>
              <option value="system">系统自匹配</option>
            </select>
          </label>
          <button type="submit" class="btn-submit">创建同步任务</button>
        </form>
      </section>

      <section class="card">
        <h2>本地镜像包上传</h2>
        <form id="uploadForm" class="inline-form">
          <label>
            选择镜像 tar 包
            <input type="file" name="imageTar" accept=".tar,.tar.gz" required />
          </label>
          <label>
            目标仓库
            <select name="targetRepo" id="uploadTargetRepo" required>
              <option value="">请选择仓库</option>
            </select>
          </label>
          <label>
            导入目标项目
            <input type="text" name="importProject" placeholder="library" required />
          </label>
          <label>
            镜像架构
            <select name="arch" id="uploadArch">
              <option value="all">多架构</option>
              <option value="system">系统自匹配</option>
            </select>
          </label>
          <button type="submit" class="btn-submit">上传并导入</button>
        </form>
        <div id="uploadProgress" style="display: none; margin-top: 16px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px;">
            <span id="progressText">准备上传...</span>
            <span id="progressSpeed"></span>
          </div>
          <div style="width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden;">
            <div id="progressBar" style="width: 0%; height: 100%; background: #2563eb; transition: width 0.3s;"></div>
          </div>
        </div>
      </section>

      <!-- SFTP 文件上传 -->
      <section class="card">
        <h2>SFTP 文件上传 <span id="rcloneStatus" style="font-size: 12px; color: var(--muted); font-weight: normal;">检查中...</span></h2>
        
        <!-- SFTP 配置表单 -->
        <form id="sftpConfigForm" class="inline-form" style="margin-bottom: 20px;">
          <label style="width: 140px !important; flex: 0 0 140px !important;">
            配置名称
            <input type="text" name="sftpName" placeholder="my-server" required />
          </label>
          <label style="width: 140px !important; flex: 0 0 140px !important;">
            SFTP服务器地址
            <input type="text" name="sftpHost" placeholder="192.168.1.100" required />
          </label>
          <div style="display: flex; gap: 16px; align-items: flex-end;">
            <label class="sftp-port-label" style="min-width: auto; margin: 0;">
              端口
              <input type="number" name="sftpPort" value="30884" style="width: 80px;" />
            </label>
            <label style="width: 140px !important; flex: 0 0 140px !important; margin: 0;">
              SFTP用户名
              <input type="text" name="sftpUsername" placeholder="admin" required />
            </label>
          </div>
          <label style="width: 140px !important; flex: 0 0 140px !important; margin-right: 24px !important;">
            密码
            <input type="password" name="sftpPassword" placeholder="******" />
          </label>
          <button type="button" id="testSftpBtn">测试连接</button>
          <button type="submit">保存配置</button>
        </form>
        
        <p id="sftpConfigStatus" class="status"></p>
        
        <!-- 已保存的 SFTP 配置列表 -->
        <div id="sftpConfigList" style="margin-top: 4px;">
          <h3 style="font-size: 14px; color: var(--muted); margin-bottom: 8px;">已保存的 SFTP 配置</h3>
          <div id="sftpList" class="repo-list"></div>
        </div>
        
        <hr style="margin: 5px 0 20px 0; border: none; border-top: 1px solid var(--border);">

        <!-- SFTP 上传表单 -->
        <form id="sftpUploadForm" class="inline-form" style="align-items: flex-end;">
          <div style="display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-end;">
            <div style="position: relative;">
              <div class="upload-option active" id="sftpFileBtn" style="border: 2px solid #2563eb; border-radius: 8px; padding: 12px 16px; cursor: pointer; transition: all 0.2s; min-width: 90px; text-align: center;">
                <input type="file" id="sftpFileInput" multiple style="display: none;" />
                <div style="font-size: 20px; margin-bottom: 4px;">📄</div>
                <div style="font-weight: 500; font-size: 13px;">上传文件</div>
              </div>
              <div id="sftpFileSelectionDisplayFile" style="color: #2563eb; font-size: 12px; margin-top: 6px; min-height: 16px; white-space: nowrap; position: absolute; top: 100%; left: 0; right: 0; text-align: center;"></div>
            </div>
            <div style="position: relative;">
              <div class="upload-option" id="sftpFolderBtn" style="border: 2px solid #e5e7eb; border-radius: 8px; padding: 12px 16px; cursor: pointer; transition: all 0.2s; min-width: 90px; text-align: center;">
                <input type="file" id="sftpFolderInput" webkitdirectory directory style="display: none;" />
                <div style="font-size: 20px; margin-bottom: 4px;">📁</div>
                <div style="font-weight: 500; font-size: 13px;">上传文件夹</div>
              </div>
              <div id="sftpFileSelectionDisplayFolder" style="color: #2563eb; font-size: 12px; margin-top: 6px; min-height: 16px; white-space: nowrap; position: absolute; top: 100%; left: 0; right: 0; text-align: center;"></div>
            </div>
          </div>
          <label style="width: 180px !important; max-width: 180px !important; flex: 0 0 180px !important; margin-bottom: 14px;">
            SFTP配置
            <select id="sftpTargetConfig" required style="width: 100%;">
              <option value="">请选择</option>
            </select>
          </label>
          <label style="width: 180px !important; max-width: 180px !important; flex: 0 0 180px !important; margin-bottom: 14px; margin-right: -30px;">
            远程路径
            <input type="text" id="sftpRemotePath" placeholder="/" value="/" required style="width: 100%;" />
          </label>
          <label style="width: auto !important; flex: 0 0 auto !important; margin-bottom: 14px;">
            <span style="visibility: hidden;">操作</span>
            <div style="display: flex; align-items: center; gap: 24px; white-space: nowrap;">
              <label style="display: flex; align-items: center; gap: 4px; margin: 0; cursor: pointer; font-size: 13px;">
                <input type="checkbox" id="sftpVerifyHash" style="margin: 0;" />
                SHA-256 校验
              </label>
              <button type="submit" class="btn-submit" style="margin: 0; width: auto; padding: 10px 20px;">开始上传</button>
              <button type="button" id="sftpCancelBtn" class="btn-submit" style="background: #ef4444; width: auto; padding: 10px 20px; display: none; margin-left: 10px;">取消上传</button>
            </div>
          </label>
        </form>
        
        <!-- SFTP 上传进度 -->
        <div id="sftpUploadProgress" style="display: none; margin-top: 16px;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px;">
            <span id="sftpProgressText">准备上传...</span>
            <span id="sftpProgressPercent"></span>
          </div>
          <div style="width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden;">
            <div id="sftpProgressBar" style="width: 0%; height: 100%; background: #2563eb; transition: width 0.3s;"></div>
          </div>
          <!-- 多文件并发上传进度列表 -->
          <div id="sftpFileProgressList" style="margin-top: 12px; max-height: 200px; overflow-y: auto;"></div>
          <div id="sftpProgressDetails" style="margin-top: 8px; font-size: 12px; color: var(--muted);"></div>
        </div>
      </section>

      <section class="card">
        <h2>任务列表</h2>
        <table>
          <thead>
            <tr>
              <th>时间</th>
              <th>类型</th>
              <th>来源</th>
              <th>目标项目</th>
              <th class="col-status">状态</th>
              <th class="col-action">操作</th>
            </tr>
          </thead>
          <tbody id="taskList"></tbody>
        </table>
      </section>

      <section class="card" id="taskDetailCard" style="display: none;">
        <h2>任务详情</h2>
        <div id="taskDetail"></div>
      </section>



    </main>

    <!-- 文件管理弹窗 -->
    <div id="fileManagerModal" class="modal">
      <div class="modal-content" style="max-width: 800px; max-height: 80vh; display: flex; flex-direction: column;">
        <div class="modal-header">
          <h3>文件管理 - <span id="fileManagerTitle"></span></h3>
          <button type="button" class="modal-close" onclick="closeFileManager()">&times;</button>
        </div>
        <div class="modal-body" style="flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 12px;">
          <!-- 路径导航 -->
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 8px; background: #f9fafb; border-radius: 6px;">
            <button class="btn-small" onclick="goBackDir()" title="返回上级">⬆️ 上级</button>
            <span style="color: #6b7280; font-size: 13px;">当前路径：</span>
            <span id="fileManagerPath" style="font-family: monospace; color: #374151; font-size: 13px; flex: 1;">/</span>
            <button class="btn-small" onclick="refreshFileList()">刷新</button>
          </div>
          <!-- 文件列表 -->
          <div id="fileManagerList" style="flex: 1; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 6px;">
            <div style="padding: 20px; text-align: center; color: #9ca3af;">加载中...</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeFileManager()">关闭</button>
        </div>
      </div>
    </div>

    <!-- 创建项目弹窗 -->
    <div id="createProjectModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>创建 Harbor 项目</h3>
          <button type="button" class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
          <label>
            目标仓库
            <select id="modalTargetRepo" required>
              <option value="">请选择仓库</option>
            </select>
          </label>
          <label>
            项目名称
            <input type="text" id="modalProjectName" placeholder="project-name" required />
            <small style="color: var(--muted); display: block; margin-top: 4px;">项目名称只能包含小写字母、数字、下划线、中划线和点</small>
          </label>
          <label>
            项目可见性
            <select id="modalProjectVisibility">
              <option value="private">私有</option>
              <option value="public">公开</option>
            </select>
            <small style="color: var(--muted); display: block; margin-top: 4px;">私有项目需要登录才能访问，公开项目可以被任何人访问</small>
          </label>
        </div>
        <div class="modal-footer">
          <button type="button" id="cancelCreateBtn" class="btn-secondary">取消</button>
          <button type="button" id="confirmCreateBtn" class="btn-primary">创建</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
